name: Update Sub
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright Chromium
        run: |
          npm init -y
          npm i playwright
          npx playwright install chromium --with-deps

      - name: Fetch dynamic sub link
        run: |
          PAGE_URL="https://www.freeclash.top/ui/free_clash"
          SUB_URL=$(npx playwright evaluate --browser chromium "$PAGE_URL" "document.querySelector('html>body>div:nth-child(1)>main>section:nth-child(2)>div>div:nth-child(3)>div:nth-child(2)').innerText.trim()")
          echo "Get sub link: $SUB_URL"
          if [ -z "$SUB_URL" ]; then echo "Link empty, exit"; exit 1; fi
          curl -s "$SUB_URL" -o htmls/free_clash/config.yaml

      - name: Commit & push
        run: |
          git config user.name "SubBot"
          git config user.email "bot@github.com"
          git add htmls/free_clash/config.yaml
          git commit -m "Auto update clash config" || true
          git push

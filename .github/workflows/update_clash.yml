name: Update Sub
# 授予写入仓库权限
permissions:
  contents: write
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright Chromium
        run: |
          [ ! -f package.json ] && npm init -y
          npm i playwright
          npx playwright install chromium --with-deps

      - name: Fetch sub link
        run: |
          mkdir -p htmls/free_clash
          cat > getlink.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            await page.goto('https://www.freeclash.top/ui/free_clash', { timeout:30000 });
            await page.waitForSelector('label span', { timeout:10000 });
            const qText = await page.$eval('label span', el => el.textContent.trim());
            const mathReg = /(\d+)\s*([+\-])\s*(\d+)/;
            const matchMath = qText.match(mathReg);
            let ans = 0;
            if(matchMath){
              const n1 = parseInt(matchMath[1]);
              const op = matchMath[2];
              const n2 = parseInt(matchMath[3]);
              ans = op === '+' ? n1 + n2 : n1 - n2;
            }
            await page.fill('input[name="answer"]', String(ans));
            await page.click('button[type="submit"]');
            await page.waitForLoadState('networkidle', { timeout:30000 });
            const html = await page.content();
            const subReg = /https:\/\/www\.freeclash\.top\/v1\/sub\/ssr\/[^\s"'<>]+/;
            const linkMatch = html.match(subReg);
            console.log(linkMatch ? linkMatch[0] : "");
            await browser.close();
          })();
          EOF
          SUB_URL=$(node getlink.js)
          echo "Get sub link: $SUB_URL"
          if [ -z "$SUB_URL" ]; then echo "Link empty, exit"; exit 1; fi
          curl -s --retry 3 "$SUB_URL" -o htmls/free_clash/config.yaml
          rm -f getlink.js

      - name: Commit & push
        run: |
          git config user.name "SubBot"
          git config user.email "bot@github.com"
          git add htmls/free_clash/config.yaml
          git commit -m "Auto update clash config" || true
          git push

name: Update Sub
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt update && sudo apt install -y curl xmllint git
      - name: Fetch sub url & download config
        run: |
          PAGE_URL="https://www.freeclash.top/ui/free_clash"
          SUB_URL=$(curl -s "$PAGE_URL" | xmllint --html --xpath '/html/body/div[1]/main/section[2]/div/div[3]/div[2]/text()' - 2>/dev/null | tr -d ' ')
          # 覆盖写入指定路径
          curl -s "$SUB_URL" -o htmls/free_clash/config.yaml
      - name: Commit & push
        run: |
          git config user.name "SubBot"
          git config user.email "bot@github.com"
          git add htmls/free_clash/config.yaml
          git commit -m "Auto update clash config" || true
          git push

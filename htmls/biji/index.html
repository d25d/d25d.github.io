<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>云端笔记托管库</title>

<style>
/* ===== 全局 ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", "Microsoft YaHei", system-ui, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #e0e7ff, #f5f7fa);
  color: #1f2937;
  padding: 30px 20px;
}

.wrap {
  max-width: 1120px;
  margin: 0 auto;
}

/* ===== 头部 ===== */
.site-head {
  text-align: center;
  padding: 36px 20px;
  border-radius: 20px;
  background: linear-gradient(120deg, #6366f1, #8b5cf6);
  color: white;
  margin-bottom: 28px;
  box-shadow: 0 12px 30px rgba(99, 102, 241, 0.25);
}

.site-head h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

.site-head p {
  font-size: 14px;
  opacity: 0.92;
}

/* ===== 统计栏 ===== */
.stat-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  font-size: 14px;
  color: #4b5563;
}

.badge {
  background: #eef2ff;
  padding: 6px 14px;
  border-radius: 999px;
  font-weight: 500;
  color: #4338ca;
}

/* ===== 卡片网格 ===== */
.note-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 22px;
}

.note-card {
  background: white;
  border-radius: 16px;
  padding: 22px;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
  transition: all 0.3s ease;
  border: 1px solid transparent;
  position: relative;
}

.note-card::before {
  content: "📄";
  font-size: 22px;
  position: absolute;
  top: 18px;
  right: 18px;
}

.note-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 14px 30px rgba(0, 0, 0, 0.1);
  border-color: #6366f1;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  color: #111827;
  margin-bottom: 8px;
  padding-right: 30px;
}

.card-desc {
  font-size: 13px;
  color: #6b7280;
}

/* ===== 空状态 ===== */
.empty-tip {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 0;
  color: #9ca3af;
  font-size: 15px;
}

/* ===== 弹窗 ===== */
.read-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal-container {
  width: 100%;
  max-width: 880px;
  max-height: 90vh;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-top {
  padding: 18px 26px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-name {
  font-size: 17px;
  font-weight: 600;
  color: #1f2937;
}

.close-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: #f3f4f6;
  font-size: 18px;
  cursor: pointer;
  color: #374151;
  transition: 0.2s;
}

.close-btn:hover {
  background: #e5e7eb;
}

/* ===== 正文 ===== */
.modal-body {
  padding: 30px;
  max-height: calc(90vh - 70px);
  overflow-y: auto;
  font-size: 15.5px;
  line-height: 1.9;
  white-space: pre-wrap;
  color: #374151;
}

/* ===== 滚动条 ===== */
.modal-body::-webkit-scrollbar {
  width: 8px;
}
.modal-body::-webkit-scrollbar-thumb {
  background: #c7c9d9;
  border-radius: 4px;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="site-head">
    <h1>☁ 云端笔记托管中心</h1>
    <p>安全存储 · 本地托管 · 在线阅读</p>
  </div>

  <div class="stat-bar">
    <span class="badge" id="countInfo">正在统计笔记数量...</span>
    <span>点击卡片即可打开阅览</span>
  </div>

  <div class="note-grid" id="noteList"></div>
</div>

<div class="read-modal" id="readModal">
  <div class="modal-container">
    <div class="modal-top">
      <span class="modal-name" id="noteTitle"></span>
      <button class="close-btn" onclick="closeReadModal()">×</button>
    </div>
    <div class="modal-body" id="noteContent">加载内容中...</div>
  </div>
</div>

<script>
const baseDir = "./paper/";
const listDom = document.getElementById("noteList");
const countDom = document.getElementById("countInfo");
const modal = document.getElementById("readModal");
const titleDom = document.getElementById("noteTitle");
const contentDom = document.getElementById("noteContent");

window.onload = loadNoteList;

async function loadNoteList(){
  try {
    const res = await fetch(baseDir);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, "text/html");
    const files = [];

    doc.querySelectorAll("a").forEach(a => {
      const name = a.querySelector(".name")?.textContent.trim();
      if (!name) return;
      if (["../","..","/"].includes(name)) return;
      if (!name.includes(".")) return;
      files.push(name);
    });

    countDom.innerText = `📚 现有笔记：${files.length} 份`;
    listDom.innerHTML = "";

    if (files.length === 0) {
      listDom.innerHTML = '<div class="empty-tip">暂无托管笔记</div>';
      return;
    }

    files.forEach(name => {
      const card = document.createElement("div");
      card.className = "note-card";
      card.innerHTML = `
        <div class="card-title">${name}</div>
        <div class="card-desc">点击查看全文</div>
      `;
      card.onclick = () => openNote(name);
      listDom.appendChild(card);
    });
  } catch {
    countDom.innerText = "目录读取异常";
    listDom.innerHTML = '<div class="empty-tip">无法加载笔记目录</div>';
  }
}

async function openNote(name){
  modal.style.display = "flex";
  titleDom.innerText = name;
  contentDom.innerText = "正在读取笔记内容...";
  try {
    const res = await fetch(baseDir + name);
    contentDom.innerText = await res.text();
  } catch {
    contentDom.innerText = "笔记内容读取失败";
  }
}

function closeReadModal(){
  modal.style.display = "none";
}

modal.addEventListener("click", e => {
  if (e.target === modal) closeReadModal();
});
</script>
</body>
</html>

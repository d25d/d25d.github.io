<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型问答</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/highlight.min.js"></script>
    <style>
        :root {
            --my-width: 15px;
        }
        @media (max-width: 1090px) {
            :root {
                --my-width: 3vw;
            }
        }
        body { 
            font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; 
            font-size: var(--my-width);
        }
        #chatBox { 
            width: 90vw; 
            height: 80vh; 
            border: 1px solid #ccc; 
            background: #fff; 
            padding: 10px; 
            overflow-y: auto; 
            margin-bottom: 10px; 
            word-wrap: break-word;
            white-space: normal;
        }
        .message { 
            margin: 10px 0; 
            padding: 8px 12px; 
            border-radius: 10px; 
            max-width: 80%; 
            word-wrap: break-word;
        }
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            font-size : var(--my-width);
        }
        .user { background: #dcf8c6; align-self: flex-end; margin-left: auto; }
        .ai { background: #ececec; align-self: flex-start; margin-right: auto; }
        #inputContainer { display: flex; }
        #inputField { flex: 1; padding: 8px; font-size: var(--my-width); }
        #sendBtn { padding: 8px 12px; font-size: var(--my-width); }

        /* API Key 输入弹窗样式 */
        #apiKeyModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        .modal-content button {
            padding: 8px 16px;
            cursor: pointer;
        }

        /* 代码样式 */
        .code {
            background-color: #f4f4f4;
            padding: 8px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            color: #333;
            white-space: pre-wrap;
            border: 1px solid #ccc;
            max-width: 90%;
        }
    </style>
</head>
<body>

<div id="chatBox"></div>

<!-- API Key 输入弹窗 -->
<div id="apiKeyModal" style="display:none;">
    <div class="modal-content">
        <h3>请输入 SiliconFlow API Key</h3>
        <input type="password" id="apiKeyInput" placeholder="粘贴你的 API Key 在这里">
        <button id="saveApiKeyBtn">保存并使用</button>
    </div>
</div>

<input type="text" id="modelInput" list="modelList" placeholder="选择或输入模型标识">
<datalist id="modelList">
    <option value="Qwen/Qwen3-8B">Qwen/Qwen3-8B</option>
    <option value="Qwen/Qwen2.5-Coder-7B-Instruct">Qwen/Qwen2.5-Coder-7B-Instruct（免费常用）</option>
    <option value="Qwen/Qwen2-7B-Instruct">Qwen/Qwen2-7B-Instruct</option>
    <option value="Qwen/Qwen2.5-7B-Instruct">Qwen/Qwen2.5-7B-Instruct</option>
</datalist>
    
<div id="inputContainer">
    <textarea id="inputField" rows="4" placeholder="输入你的问题..."></textarea>
    <button id="sendBtn">发送</button>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const inputField = document.getElementById("inputField");
    const sendBtn = document.getElementById("sendBtn");
    const apiKeyModal = document.getElementById("apiKeyModal");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const saveApiKeyBtn = document.getElementById("saveApiKeyBtn");

    // ======================================
    // API Key 本地存储逻辑（核心修改）
    // ======================================
    const API_KEY_STORAGE = "siliconflow_api_key";

    // 从本地存储读取 API Key
    function getSavedApiKey() {
        return localStorage.getItem(API_KEY_STORAGE);
    }

    // 保存 API Key 到本地
    function saveApiKey(key) {
        localStorage.setItem(API_KEY_STORAGE, key.trim());
    }

    // 显示 API Key 输入弹窗
    function showApiKeyModal() {
        apiKeyModal.style.display = "flex";
    }

    // 隐藏弹窗
    function hideApiKeyModal() {
        apiKeyModal.style.display = "none";
    }

    // 页面加载时检查是否有 API Key
    window.addEventListener("load", () => {
        const savedKey = getSavedApiKey();
        if (!savedKey) {
            showApiKeyModal(); // 没有就弹出输入框
        }
    });

    // 保存按钮事件
    saveApiKeyBtn.addEventListener("click", () => {
        const key = apiKeyInput.value.trim();
        if (!key) {
            alert("请输入有效的 API Key");
            return;
        }
        saveApiKey(key);
        hideApiKeyModal();
        alert("API Key 保存成功！下次打开自动使用");
    });
    // ======================================

    // 获取当前时间
    function getCurrentTime() {
        const now = new Date();
        return `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
    }

    // 处理消息显示
    function handleMessage(text, sender) {
        const message = document.createElement("div");
        message.className = `message ${sender}`;

        marked.setOptions({
            renderer: new marked.Renderer(),
            highlight: function(code) {
                return hljs.highlightAuto(code).value;
            }
        });
        message.innerHTML = marked.parse(text);

        const timeDiv = document.createElement('div');
        timeDiv.className = 'message-time';
        timeDiv.textContent = getCurrentTime();
        message.appendChild(timeDiv);

        chatBox.appendChild(message);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 发送请求
    async function fetchData() {
        // 先检查 API Key
        const API_KEY = getSavedApiKey();
        if (!API_KEY) {
            showApiKeyModal();
            sendBtn.disabled = false;
            return;
        }

        sendBtn.disabled = true;
        const userInput = inputField.value.trim();
        if (!userInput) {
            sendBtn.disabled = false;
            return;
        }

        let selectedModel = document.getElementById("modelInput").value.trim();
        handleMessage(userInput, "user");
        inputField.value = "";

        const aiReply = await generateAIResponse(userInput, selectedModel, API_KEY);
        handleMessage(aiReply, "ai");
        sendBtn.disabled = false;
    }

    // 请求 AI
    async function generateAIResponse(userInput, model, API_KEY) {
        const url = 'https://api.siliconflow.cn/v1/chat/completions';

        const options = {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: model,
                messages: [{ role: "user", content: userInput }],
                stream: false,
                max_tokens: 4096,
                temperature: 0.7,
                top_p: 0.7,
                top_k: 50,
                frequency_penalty: 0.5,
                min_p: 0.05,
                n: 1,
                stop: [],
                response_format: { type: "text" }
            })
        };

        try {
            const response = await fetch(url, options);
            const data = await response.json();
            return data.choices?.[0]?.message?.content || '请求失败，请检查 API Key 和模型';
        } catch (error) {
            console.error('AI 请求失败:', error);
            return '网络错误或请求失败';
        }
    }

    // 绑定事件
    sendBtn.addEventListener("click", fetchData);
    inputField.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            fetchData();
        }
    });
</script>

</body>
</html>

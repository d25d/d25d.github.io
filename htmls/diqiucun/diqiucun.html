<div class="chat-box">

        <span class="badge" id="roleBadge">检测中</span>
    </div>

    </div>

        <button id="sendBtn">发送</button>
    </div>
    <div class="status" id="status">初始化中</div>
</div>

<script>
    const ROOM_ID = "EARTH_ROOM_V7";
    
    let peer = null;
    let conn = null;
    let isRelay = false;
    let myId = "";
    let myName = "";
    let myAvatar = "";
    let clients = new Map();
    let heartbeatTimer = null;
    let reconnectTimer = null;
    let lastPong = Date.now();
    let isShuttingDown = false;
    
    // 随机身份 - 确保 emoji 正确显示
    const avatars = ["🐻", "🐰", "🐱", "🦊", "🐼", "🐨", "🐸", "🐧", "🦄", "🐙", "🐥", "🐶"];
    const names = ["云朵糖", "星星兔", "布丁熊", "月亮猫", "花栗鼠", "棉花鹿", "团子狸", "泡泡龙", "奶茶熊", "柠檬鱼"];
    
    function initId() {
        let stored = localStorage.getItem("my_id");
        if (stored) {
            try {
                let d = JSON.parse(stored);
                if (d.name && d.id) {
                    myName = d.name;
                    myAvatarIndex = d.avatarIndex;
                    myId = d.id;
                    console.log("已有身份:", myName, avatars[myAvatarIndex], myId);
                    return;
                }
            } catch(e) {}
        }
        // 存储时存索引（数字）
        myAvatarIndex = Math.floor(Math.random() * avatars.length);
        myAvatar = avatars[myAvatarIndex];
        myName = names[Math.floor(Math.random() * names.length)];
        myId = "u_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
        localStorage.setItem("my_id", JSON.stringify({ name: myName, avatarIndex: myAvatarIndex, id: myId }));
        console.log("新身份:", myName, avatars[myAvatarIndex], myId);
    }
    initId();
    
    // DOM
    const msgArea = document.getElementById("msgArea");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusSpan = document.getElementById("status");
    const roleBadge = document.getElementById("roleBadge");
    
    function addMsg(senderName, senderAvatarIndex, text, isSelf, isSystem, timeStr) {
        const div = document.createElement("div");
        const time = timeStr || new Date().toLocaleTimeString();
        if (isSystem) {
            div.className = "msg msg-system";
            div.innerHTML = `📢 ${text}`;
        } else {
            div.className = `msg ${isSelf ? "msg-self" : "msg-other"}`;
            // 确保头像和名字正确显示
            const avatarDisplay = avatars[senderAvatarIndex];
            const nameDisplay = senderName || "匿名";
            div.innerHTML = `<div class="sender">${avatarDisplay} ${escapeHtml(nameDisplay)} ${time}</div><div>${escapeHtml(text)}</div>`;
        }
        msgArea.appendChild(div);
        div.scrollIntoView({ behavior: "smooth" });
        while (msgArea.children.length > 100) msgArea.removeChild(msgArea.firstChild);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function setStatusMsg(text) {
        statusSpan.innerHTML = text;
    }
    
    // ========== 中继站 ==========
    function startRelay() {
        if (isShuttingDown) return;
        
        if (peer && !peer.destroyed) {
            try { peer.destroy(); } catch(e) {}
            peer = null;
        }
        
        isRelay = true;
        roleBadge.innerHTML = "🌟 中继站";
        setStatusMsg("中继站运行中");
        msgInput.disabled = false;
        sendBtn.disabled = false;
        
        console.log("启动中继站");
        
        peer = new Peer(ROOM_ID, { debug: 0, serialization: "json" });
        
        peer.on("open", () => {
            console.log("中继站启动成功");
            addMsg("系统", "", "你已成为中继站", false, true);
        });
        
        peer.on("connection", (c) => {
            if (c.peer === myId) return;
            console.log("客户端连接:", c.peer);
            clients.set(c, { name: null, avatarIndex: null, id: c.peer });
            
            c.on("data", (data) => {
                console.log("中继收到:", data.type, data);
                
                if (data.type === "join") {
                    let info = clients.get(c);
                    info.name = data.name;
                    info.avatarIndex = data.avatarIndex;
                    clients.set(c, info);
                    
                    // 广播加入消息
                    for (let [cc, ii] of clients) {
                        if (cc !== c && cc.open) {
                            try { cc.send({ type: "system", text: `${data.name} ${avatars[data.avatarIndex]} 加入了聊天室` }); } catch(e) {}
                        }
                    }
                    c.send({ type: "welcome", text: `欢迎 ${data.name}！当前 ${clients.size} 人在线` });
                    
                    // 更新人数
                    for (let [cc, ii] of clients) {
                        if (cc.open) {
                            try { cc.send({ type: "count", count: clients.size + 1 }); } catch(e) {}
                        }
                    }
                }
                else if (data.type === "chat") {
                    // 统一字段名：name, avatarIndex, text, time
                    const chatData = {
                        type: "chat",
                        name: data.name,
                        avatarIndex: data.avatarIndex,
                        text: data.text,
                        time: data.time
                    };
                    // 转发给所有其他客户端
                    for (let [cc, ii] of clients) {
                        if (cc !== c && cc.open) {
                            try { cc.send(chatData); } catch(e) {}
                        }
                    }
                    // 中继自己显示
                    addMsg(data.name, data.avatarIndex, data.text, false, false, data.time);
                }
                else if (data.type === "ping" || data.type === "HEARTBEAT") {
                    try { c.send({ type: "pong" }); } catch(e) {}
                }
            });
            
            c.on("close", () => {
                let info = clients.get(c);
                if (info && info.name) {
                    for (let [cc, ii] of clients) {
                        if (cc !== c && cc.open) {
                            try { cc.send({ type: "system", text: `${info.name} ${avatars[info.avatarIndex]} 离开了聊天室` }); } catch(e) {}
                        }
                    }
                }
                clients.delete(c);
                for (let [cc, ii] of clients) {
                    if (cc.open) {
                        try { cc.send({ type: "count", count: clients.size + 1 }); } catch(e) {}
                    }
                }
            });
        });
        
        peer.on("error", (err) => {
            console.log("中继错误:", err);
            if (err.type === "unavailable-id") {
                addMsg("系统", "", "已有中继站，切换客户端", false, true);
                setTimeout(() => startClient(), 500);
            }
        });
    }
    
    function relaySend(text) {
        if (!text.trim()) return;
        const time = new Date().toLocaleTimeString();
        addMsg(myName, myAvatarIndex, text, true, false, time);
        
        const chatData = {
            type: "chat",
            name: myName,
            avatarIndex: myAvatarIndex,
            text: text,
            time: time
        };
        
        for (let [c, info] of clients) {
            if (c.open) {
                try { c.send(chatData); } catch(e) {}
            }
        }
        msgInput.value = "";
    }
    
    // ========== 客户端 ==========
    function startClient() {
        if (isShuttingDown) return;
        
        if (conn) {
            try { conn.close(); } catch(e) {}
            conn = null;
        }
        if (heartbeatTimer) {
            clearInterval(heartbeatTimer);
            heartbeatTimer = null;
        }
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }
        if (peer && !peer.destroyed) {
            try { peer.destroy(); } catch(e) {}
            peer = null;
        }
        
        isRelay = false;
        roleBadge.innerHTML = "🔗 客户端";
        setStatusMsg("连接中...");
        msgInput.disabled = true;
        sendBtn.disabled = true;
        
        console.log("启动客户端, ID:", myId);
        
        peer = new Peer(myId, { debug: 0, serialization: "json" });
        
        peer.on("open", (id) => {
            console.log("客户端启动成功, ID:", id);
            if (myId !== id) {
                myId = id;
                localStorage.setItem("my_id", JSON.stringify({ name: myName, avatarIndex: myAvatarIndex, id: myId }));
            }
            connectToRelay();
        });
        
        peer.on("error", (err) => {
            console.log("客户端错误:", err);
            setStatusMsg("连接错误，3秒后重试");
            scheduleClientRestart();
        });
    }
    
    function connectToRelay() {
        if (!peer) return;
        
        console.log("尝试连接中继");
        conn = peer.connect(ROOM_ID);
        
        const timeout = setTimeout(() => {
            if (conn && !conn.open) {
                console.log("连接超时");
                try { conn.close(); } catch(e) {}
                scheduleClientRestart();
            }
        }, 10000);
        
        conn.on("open", () => {
            clearTimeout(timeout);
            console.log("已连接到中继");
            setStatusMsg("已连接");
            msgInput.disabled = false;
            sendBtn.disabled = false;
            
            conn.send({ type: "join", name: myName, avatarIndex: myAvatarIndex, id: myId });
            addMsg("系统", "", "已加入聊天室", false, true);
            lastPong = Date.now();
            
            if (heartbeatTimer) clearInterval(heartbeatTimer);
            heartbeatTimer = setInterval(() => {
                if (conn && conn.open) {
                    try { conn.send({ type: "ping" }); } catch(e) {}
                    if (Date.now() - lastPong > 20000) {
                        console.log("心跳超时");
                        try { conn.close(); } catch(e) {}
                    }
                }
            }, 8000);
        });
        
        conn.on("data", (data) => {
            console.log("客户端收到:", data.type, data);
            
            if (data.type === "chat") {
                // 统一使用 name, avatarIndex, text
                addMsg(data.name, data.avatarIndex, data.text, false, false, data.time);
            } else if (data.type === "system") {
                addMsg("系统", "", data.text, false, true);
            } else if (data.type === "welcome") {
                addMsg("系统", "", data.text, false, true);
            } else if (data.type === "pong") {
                lastPong = Date.now();
            }
        });
        
        conn.on("close", () => {
            console.log("连接断开");
            setStatusMsg("断开，重连...");
            msgInput.disabled = true;
            sendBtn.disabled = true;
            if (heartbeatTimer) clearInterval(heartbeatTimer);
            scheduleClientRestart();
        });
        
        conn.on("error", (err) => {
            console.log("连接错误:", err);
            scheduleClientRestart();
        });
    }
    
    function scheduleClientRestart() {
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(() => {
            console.log("重启客户端");
            startClient();
        }, 3000);
    }
    
    function clientSend(text) {
        if (!text.trim() || !conn || !conn.open) {
            setStatusMsg("未连接");
            return;
        }
        const time = new Date().toLocaleTimeString();
        addMsg(myName, myAvatarIndex, text, true, false, time);
        try {
            conn.send({
                type: "chat",
                name: myName,
                avatarIndex: myAvatarIndex,
                text: text,
                time: time
            });
        } catch(e) {}
        msgInput.value = "";
    }
    
    // ========== 发送 ==========
    function send() {
        let text = msgInput.value.trim();
        if (!text) return;
        if (isRelay) relaySend(text);
        else clientSend(text);
    }
    
    sendBtn.onclick = send;
    msgInput.onkeypress = (e) => { if (e.key === "Enter") send(); };
    
    // ========== 检测启动 ==========
    function detect() {
        console.log("开始检测中继...");
        let testPeer = new Peer({ debug: 0, serialization: "json" });
        let completed = false;
        
        const cleanup = () => {
            if (completed) return;
            completed = true;
            try { testPeer.destroy(); } catch(e) {}
        };
        
        testPeer.on("open", () => {
            let testConn = testPeer.connect(ROOM_ID);
            let timeout = setTimeout(() => {
                if (!completed) {
                    console.log("无中继，成为中继站");
                    cleanup();
                    startRelay();
                }
            }, 2000);
            
            testConn.on("open", () => {
                if (!completed) {
                    clearTimeout(timeout);
                    console.log("中继存在，成为客户端");
                    cleanup();
                    startClient();
                }
            });
            
            testConn.on("error", () => {
                if (!completed) {
                    clearTimeout(timeout);
                    console.log("连接失败，成为中继站");
                    cleanup();
                    startRelay();
                }
            });
        });
        
        testPeer.on("error", () => {
            if (!completed) {
                console.log("Peer错误，成为中继站");
                cleanup();
                startRelay();
            }
        });
    }
    
    // 页面关闭
    window.onbeforeunload = () => {
        isShuttingDown = true;
        if (conn && conn.open) {
            try { conn.send({ type: "leave" }); } catch(e) {}
        }
        if (peer && !peer.destroyed) peer.destroy();
    };
    
    setTimeout(detect, Math.random() * 1000);
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🌍 地球心声 · 漂流信使</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #c8e8ff, #8fc1e0);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        /* 地球装饰背景 */
        body::before {
            content: "🌍";
            position: fixed;
            bottom: 5%;
            right: 3%;
            font-size: 120px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            animation: floatGlobe 12s infinite ease-in-out;
        }

        @keyframes floatGlobe {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.08; }
            50% { transform: translateY(-15px) rotate(5deg); opacity: 0.15; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.08; }
        }

        /* 主容器 - 玻璃质感 + 响应式 */
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 252, 240, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 4px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 750px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 245, 200, 0.6);
            z-index: 2;
        }

        /* 头部设计 */
        .chat-header {
            background: linear-gradient(135deg, #3b8b5e, #2a6b48);
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            backdrop-filter: blur(4px);
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .title-section span:first-child {
            font-size: 1.7rem;
        }

        .badge-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .role-badge {
            background: #ffdd99;
            color: #5a3a22;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            backdrop-filter: blur(2px);
        }

        .online-badge {
            background: rgba(255,255,220,0.25);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 消息区域 - 柔和滚动条 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(250, 245, 235, 0.5);
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #f0e6d8;
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #c7a86b;
            border-radius: 10px;
        }

        /* 气泡消息 */
        .msg {
            max-width: 82%;
            padding: 10px 16px;
            border-radius: 28px;
            word-break: break-word;
            animation: fadeInUp 0.2s ease-out;
            transition: transform 0.1s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-self {
            background: #dcf8c5;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .msg-other {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .msg-system {
            background: #e9e2d4;
            align-self: center;
            text-align: center;
            font-size: 0.7rem;
            color: #7d6b4a;
            max-width: 88%;
            border-radius: 40px;
            padding: 6px 16px;
            font-style: italic;
        }

        .sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: #bf7b3c;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .sender-name {
            letter-spacing: 0.3px;
        }

        .msg-time {
            font-size: 0.6rem;
            font-weight: normal;
            color: #a58f72;
            margin-left: auto;
        }

        .msg-text {
            font-size: 0.92rem;
            line-height: 1.4;
            color: #2d3e2b;
        }

        /* 底部输入区 */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: rgba(255, 250, 240, 0.96);
            backdrop-filter: blur(12px);
            border-top: 1px solid #f0e2cf;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #f0dbb8;
            background: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-area input:focus {
            border-color: #ffb45e;
            box-shadow: 0 0 0 3px rgba(255, 180, 94, 0.2);
        }

        .input-area input:disabled {
            background: #faf2e6;
            color: #b9926b;
        }

        .input-area button {
            background: #fea73f;
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            height: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .input-area button:active {
            transform: scale(0.96);
            background: #e88d2a;
        }

        .input-area button:disabled {
            background: #cfbba2;
            cursor: not-allowed;
            transform: none;
        }

        /* 连接状态条 */
        .status-bar {
            font-size: 0.7rem;
            padding: 8px 20px;
            background: #faf3e8;
            text-align: center;
            color: #8b765a;
            border-top: 1px solid #f3e5d4;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .chat-container {
                height: 90vh;
                border-radius: 32px;
            }
            .chat-header {
                padding: 12px 18px;
            }
            .title-section {
                font-size: 1.1rem;
            }
            .role-badge, .online-badge {
                padding: 4px 12px;
                font-size: 0.7rem;
            }
            .messages-area {
                padding: 14px 12px;
            }
            .msg {
                max-width: 90%;
                padding: 8px 14px;
            }
            .input-area {
                padding: 12px 16px;
                gap: 8px;
            }
            .input-area input {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
            .input-area button {
                padding: 0 20px;
                height: 46px;
                font-size: 0.9rem;
            }
            .sender {
                font-size: 0.65rem;
            }
        }

        /* 小点缀动画 */
        @keyframes subtlePulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #6fbf4c;
            border-radius: 50%;
            display: inline-block;
            animation: subtlePulse 1.2s infinite alternate;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="title-section">
            <span>🌍</span> 地球心声 · 漂流信使
        </div>
        <div class="badge-group">
            <span class="role-badge" id="roleBadge">🔄 检测中</span>
            <span class="online-badge" id="onlineBadge">👥 1人</span>
        </div>
    </div>

    <div class="messages-area" id="msgArea">
        <div class="msg msg-system">✨ 欢迎来到地球心声，连接星辰大海...</div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="写下此刻的心情... 所有人都会看到 🌈" maxlength="200" autocomplete="off">
        <button id="sendBtn">✈️ 发送</button>
    </div>
    <div class="status-bar" id="statusBar">
        <span class="status-dot"></span> <span id="statusText">正在连接星系网络...</span>
    </div>
</div>

<script>
    // ================= 稳固版核心（保留全部原有逻辑，仅优化UI绑定） =================
    const ROOM_ID = "EARTH_ROOM_V7";
    
    let peer = null;
    let conn = null;
    let isRelay = false;
    let myId = "";
    let myName = "";
    let myAvatarIndex = 0;
    let clients = new Map();
    let heartbeatTimer = null;
    let reconnectTimer = null;
    let lastPong = Date.now();
    let isShuttingDown = false;
    
    // Emoji库与昵称库
    const avatars = ["🐻", "🐰", "🐱", "🦊", "🐼", "🐨", "🐸", "🐧", "🦄", "🐙", "🐥", "🐶"];
    const names = ["云朵糖", "星星兔", "布丁熊", "月亮猫", "花栗鼠", "棉花鹿", "团子狸", "泡泡龙", "奶茶熊", "柠檬鱼", "蜜桃猪", "青鸟啾"];
    
    // 身份初始化（存储索引，彻底告别emoji乱码）
    function initId() {
        let stored = localStorage.getItem("earth_chat_final");
        if (stored) {
            try {
                let d = JSON.parse(stored);
                if (d.name && d.id !== undefined) {
                    myName = d.name;
                    myAvatarIndex = (d.avatarIndex !== undefined) ? d.avatarIndex : Math.floor(Math.random() * avatars.length);
                    myId = d.id;
                    console.log("已有身份:", myName, avatars[myAvatarIndex], myId);
                    return;
                }
            } catch(e) {}
        }
        myAvatarIndex = Math.floor(Math.random() * avatars.length);
        myName = names[Math.floor(Math.random() * names.length)];
        myId = "u_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
        localStorage.setItem("earth_chat_final", JSON.stringify({ name: myName, avatarIndex: myAvatarIndex, id: myId }));
        console.log("新身份:", myName, avatars[myAvatarIndex], myId);
    }
    initId();
    
    // DOM 元素绑定
    const msgArea = document.getElementById("msgArea");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusTextSpan = document.getElementById("statusText");
    const roleBadgeSpan = document.getElementById("roleBadge");
    const onlineBadgeSpan = document.getElementById("onlineBadge");
    
    // 辅助方法
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    
    function addMessage(senderName, senderAvatarIndex, text, isSelf, isSystem, timeStr) {
        const div = document.createElement("div");
        const time = timeStr || formatTime();
        if (isSystem) {
            div.className = "msg msg-system";
            div.innerHTML = `📢 ${escapeHtml(text)}`;
        } else {
            div.className = `msg ${isSelf ? "msg-self" : "msg-other"}`;
            const avatarDisplay = avatars[senderAvatarIndex] || "🐻";
            const nameDisplay = escapeHtml(senderName) || "旅人";
            div.innerHTML = `
                <div class="sender">
                    <span>${avatarDisplay}</span>
                    <span class="sender-name">${nameDisplay}</span>
                    <span class="msg-time">${escapeHtml(time)}</span>
                </div>
                <div class="msg-text">${escapeHtml(text)}</div>
            `;
        }
        msgArea.appendChild(div);
        div.scrollIntoView({ behavior: "smooth", block: "nearest" });
        // 保留最多200条消息防止卡顿
        while (msgArea.children.length > 200) msgArea.removeChild(msgArea.firstChild);
    }
    
    function updateOnlineCount(count) {
        onlineBadgeSpan.innerHTML = `👥 ${count}人`;
    }
    
    function setStatusMsg(text, isError = false) {
        statusTextSpan.innerHTML = text;
        if (isError) {
            statusTextSpan.style.color = "#d45a2b";
        } else {
            statusTextSpan.style.color = "#8b765a";
        }
    }
    
    // 中继站逻辑 (完全保留原版核心)
    function startRelay() {
        if (isShuttingDown) return;
        if (peer && !peer.destroyed) { try { peer.destroy(); } catch(e) {} peer = null; }
        isRelay = true;
        roleBadgeSpan.innerHTML = "🌟 中继站";
        setStatusMsg("作为中继站运行中，其他人可加入");
        msgInput.disabled = false;
        sendBtn.disabled = false;
        console.log("启动中继站");
        peer = new Peer(ROOM_ID, { debug: 0, serialization: "json" });
        peer.on("open", () => {
            console.log("中继站启动成功");
            addMessage("系统", 0, "你已成为地球中继站", false, true);
        });
        peer.on("connection", (c) => {
            if (c.peer === myId) return;
            console.log("客户端连接:", c.peer);
            clients.set(c, { name: null, avatarIndex: 0, id: c.peer });
            c.on("data", (data) => {
                if (!data) return;
                if (data.type === "join") {
                    let info = clients.get(c);
                    info.name = data.name;
                    info.avatarIndex = data.avatarIndex;
                    clients.set(c, info);
                    for (let [cc, ii] of clients) {
                        if (cc !== c && cc.open) {
                            try { cc.send({ type: "system", text: `${data.name} ${avatars[data.avatarIndex]} 加入了聊天室` }); } catch(e) {}
                        }
                    }
                    c.send({ type: "welcome", text: `欢迎 ${data.name}！当前 ${clients.size} 人在线` });
                    for (let [cc, ii] of clients) {
                        if (cc.open) try { cc.send({ type: "count", count: clients.size + 1 }); } catch(e) {}
                    }
                }
                else if (data.type === "chat") {
                    const chatData = { type: "chat", name: data.name, avatarIndex: data.avatarIndex, text: data.text, time: data.time };
                    for (let [cc, ii] of clients) {
                        if (cc !== c && cc.open) try { cc.send(chatData); } catch(e) {}
                    }
                    addMessage(data.name, data.avatarIndex, data.text, false, false, data.time);
                }
                else if (data.type === "ping" || data.type === "HEARTBEAT") {
                    try { c.send({ type: "pong" }); } catch(e) {}
                }
            });
            c.on("close", () => {
                let info = clients.get(c);
                if (info && info.name) {
                    for (let [cc, ii] of clients) {
                        if (cc !== c && cc.open) try { cc.send({ type: "system", text: `${info.name} ${avatars[info.avatarIndex]} 离开了聊天室` }); } catch(e) {}
                    }
                }
                clients.delete(c);
                for (let [cc, ii] of clients) {
                    if (cc.open) try { cc.send({ type: "count", count: clients.size + 1 }); } catch(e) {}
                }
            });
        });
        peer.on("error", (err) => {
            console.log("中继错误:", err);
            if (err.type === "unavailable-id") {
                addMessage("系统", 0, "已有中继站，切换客户端", false, true);
                setTimeout(() => startClient(), 500);
            }
        });
    }
    
    function relaySend(text) {
        if (!text.trim()) return;
        const time = formatTime();
        addMessage(myName, myAvatarIndex, text, true, false, time);
        const chatData = { type: "chat", name: myName, avatarIndex: myAvatarIndex, text: text, time: time };
        for (let [c, info] of clients) {
            if (c.open) try { c.send(chatData); } catch(e) {}
        }
        msgInput.value = "";
    }
    
    // 客户端逻辑
    function startClient() {
        if (isShuttingDown) return;
        if (conn) { try { conn.close(); } catch(e) {} conn = null; }
        if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        if (peer && !peer.destroyed) { try { peer.destroy(); } catch(e) {} peer = null; }
        isRelay = false;
        roleBadgeSpan.innerHTML = "🔗 客户端";
        setStatusMsg("连接中...");
        msgInput.disabled = true;
        sendBtn.disabled = true;
        console.log("启动客户端, ID:", myId);
        peer = new Peer(myId, { debug: 0, serialization: "json" });
        peer.on("open", (id) => {
            console.log("客户端启动成功, ID:", id);
            if (myId !== id) {
                myId = id;
                localStorage.setItem("earth_chat_final", JSON.stringify({ name: myName, avatarIndex: myAvatarIndex, id: myId }));
            }
            connectToRelay();
        });
        peer.on("error", () => {
            setStatusMsg("连接错误，重试...", true);
            scheduleClientRestart();
        });
    }
    
    function connectToRelay() {
        if (!peer) return;
        conn = peer.connect(ROOM_ID);
        const timeout = setTimeout(() => {
            if (conn && !conn.open) { try { conn.close(); } catch(e) {} scheduleClientRestart(); }
        }, 10000);
        conn.on("open", () => {
            clearTimeout(timeout);
            setStatusMsg("已连接地球心声");
            msgInput.disabled = false;
            sendBtn.disabled = false;
            conn.send({ type: "join", name: myName, avatarIndex: myAvatarIndex, id: myId });
            addMessage("系统", 0, "已加入聊天室", false, true);
            lastPong = Date.now();
            if (heartbeatTimer) clearInterval(heartbeatTimer);
            heartbeatTimer = setInterval(() => {
                if (conn && conn.open) {
                    try { conn.send({ type: "ping" }); } catch(e) {}
                    if (Date.now() - lastPong > 20000) { console.log("心跳超时"); try { conn.close(); } catch(e) {} }
                }
            }, 8000);
        });
        conn.on("data", (data) => {
            if (data.type === "chat") {
                addMessage(data.name, data.avatarIndex, data.text, false, false, data.time);
            } else if (data.type === "system") {
                addMessage("系统", 0, data.text, false, true);
            } else if (data.type === "welcome") {
                addMessage("系统", 0, data.text, false, true);
            } else if (data.type === "count") {
                updateOnlineCount(data.count);
            } else if (data.type === "pong") {
                lastPong = Date.now();
            }
        });
        conn.on("close", () => {
            setStatusMsg("断开连接，重连...", true);
            msgInput.disabled = true;
            sendBtn.disabled = true;
            if (heartbeatTimer) clearInterval(heartbeatTimer);
            scheduleClientRestart();
        });
        conn.on("error", () => scheduleClientRestart());
    }
    
    function scheduleClientRestart() {
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(() => {
            if (peer && !peer.destroyed) try { peer.destroy(); } catch(e) {}
            startClient();
        }, 3000);
    }
    
    function clientSend(text) {
        if (!text.trim() || !conn || !conn.open) { setStatusMsg("未连接", true); return; }
        const time = formatTime();
        addMessage(myName, myAvatarIndex, text, true, false, time);
        try {
            conn.send({ type: "chat", name: myName, avatarIndex: myAvatarIndex, text: text, time: time });
        } catch(e) {}
        msgInput.value = "";
    }
    
    // 统一发送入口
    function sendMessage() {
        let text = msgInput.value.trim();
        if (!text) return;
        if (isRelay) relaySend(text);
        else clientSend(text);
    }
    
    sendBtn.onclick = sendMessage;
    msgInput.onkeypress = (e) => { if (e.key === "Enter") sendMessage(); };
    
    // 中继检测 (选举机制)
    function detectAndStart() {
        console.log("开始检测中继...");
        let testPeer = new Peer({ debug: 0, serialization: "json" });
        let completed = false;
        const cleanup = () => {
            if (completed) return;
            completed = true;
            try { testPeer.destroy(); } catch(e) {}
        };
        testPeer.on("open", () => {
            let testConn = testPeer.connect(ROOM_ID);
            let timeout = setTimeout(() => {
                if (!completed) { cleanup(); startRelay(); }
            }, 2000);
            testConn.on("open", () => {
                clearTimeout(timeout);
                if (!completed) { cleanup(); startClient(); }
            });
            testConn.on("error", () => {
                clearTimeout(timeout);
                if (!completed) { cleanup(); startRelay(); }
            });
        });
        testPeer.on("error", () => { if (!completed) { cleanup(); startRelay(); } });
    }
    
    // 页面关闭清理
    window.onbeforeunload = () => {
        isShuttingDown = true;
        if (conn && conn.open) try { conn.send({ type: "leave" }); } catch(e) {}
        if (peer && !peer.destroyed) peer.destroy();
    };
    
    // 启动
    setTimeout(detectAndStart, Math.random() * 1000);
</script>
</body>
</html>

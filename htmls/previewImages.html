<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时图片链接预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            background-color: #f5f7fa;
            line-height: 1.6;
        }

        .title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .tips {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .batch-input {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: vertical;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s;
        }

        .batch-input:focus {
            border-color: #409eff;
        }

        #link-container {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .link-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        .link-input:focus {
            border-color: #409eff;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-add {
            background-color: #67c23a;
            color: white;
        }

        .btn-add:hover {
            background-color: #5eb833;
        }

        .btn-remove {
            background-color: #f56c6c;
            color: white;
        }

        .btn-remove:hover {
            background-color: #e45656;
        }

        .num-tag {
            padding: 6px 10px;
            background: #e9eefb;
            color: #409eff;
            border-radius: 4px;
            font-size: 13px;
            min-width: 36px;
            text-align: center;
        }

        #preview-container {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .preview-title {
            grid-column: 1 / -1;
            font-size: 18px;
            text-align: center;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }

        .image-card {
            position: relative;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .link-tooltip {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 8px;
            font-size: 12px;
            word-break: break-all;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .image-card:hover .link-tooltip {
            opacity: 1;
        }

        .link-tooltip:active{
            background:rgba(0,0,0,0.9);
        }

        .empty-tip {
            grid-column: 1 / -1;
            color: #999;
            text-align: center;
            padding: 40px 0;
            font-size: 14px;
        }

        .error-tip {
            color: #f56c6c;
            font-size: 12px;
            text-align: center;
            word-break: break-all;
        }

        .copy-tip {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <h1 class="title">实时图片链接预览</h1>
    <p class="tips">✅ 输入自动预览 ✅ 悬停显示链接 ✅ 点击图片复制链接</p>

    <textarea class="batch-input" placeholder="多个图片链接  自动提取链接，输入/粘贴后立即预览" oninput="previewImages()"></textarea>

    <div id="link-container">
        <div class="link-input-group">
            <input type="text" class="link-input" placeholder="输入单张图片网址" oninput="previewImages()">
            <button class="btn btn-add" onclick="addLinkInput()">+ 添加</button>
            <span class="num-tag">1</span>
        </div>
    </div>

    <div id="preview-container">
        <div class="preview-title">图片预览</div>
        <div class="empty-tip">请输入图片链接...</div>
    </div>

    <script>
        // 统一刷新所有序号
        function refreshNumber(){
            const groups = document.querySelectorAll('.link-input-group');
            groups.forEach((item,idx)=>{
                item.querySelector('.num-tag').innerText = idx + 1;
            });
        }

        // 清洗链接多余符号
        function cleanUrl(url){
            return url.replace(/[，。、；:;"'()（）\[\],\s\n\r]+$/g,'').replace(/^[，。、；:;"'()（）\[\],\s]+/g,'');
        }

        // 提取纯净链接
        function getPureUrls(text){
            if(!text) return [];
            let reg = /https?:\/\/[^，。、；:;"'()（）\[\],\s\n\r]+/gi;
            let arr = text.match(reg) || [];
            return [...new Set(arr.map(item=>cleanUrl(item)).filter(v=>v))];
        }

        // 轻提示 1秒自动消失
        function showTip(text){
            let tip = document.createElement('div');
            tip.className = 'copy-tip';
            tip.innerText = text;
            document.body.appendChild(tip);
            setTimeout(()=>{
                tip.remove();
            },1000);
        }

        // 复制链接函数
        async function copyLink(text){
            try{
                await navigator.clipboard.writeText(text);
                showTip("链接复制成功");
            }catch(e){
                let input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showTip("链接复制成功");
            }
        }

        // 添加输入框
        function addLinkInput() {
            const container = document.getElementById('link-container');
            const newInputGroup = document.createElement('div');
            newInputGroup.className = 'link-input-group';
            newInputGroup.innerHTML = `
                <input type="text" class="link-input" placeholder="输入单张图片网址" oninput="previewImages()">
                <button class="btn btn-remove" onclick="removeLinkInput(this)">- 删除</button>
                <span class="num-tag"></span>
            `;
            container.appendChild(newInputGroup);
            refreshNumber();
            previewImages();
        }

        // 删除输入框
        function removeLinkInput(btn) {
            btn.parentElement.remove();
            refreshNumber();
            previewImages();
        }

        function previewImages() {
            const container = document.getElementById('preview-container');
            container.innerHTML = `<div class="preview-title">图片预览</div>`;

            const batchVal = document.querySelector('.batch-input').value;
            const singleInputs = document.querySelectorAll('.link-input');
            let allLinks = getPureUrls(batchVal);

            singleInputs.forEach(input => {
                let val = input.value.trim();
                if(val) allLinks.push(cleanUrl(val));
            });

            allLinks = [...new Set(allLinks)].filter(u=>u);

            if (allLinks.length === 0) {
                container.innerHTML += `<div class="empty-tip">请输入图片链接...</div>`;
                return;
            }

            allLinks.forEach(link => {
                const card = document.createElement('div');
                card.className = 'image-card';
                
                const img = document.createElement('img');
                img.className = 'preview-image';
                img.src = link;
                
                const tooltip = document.createElement('div');
                tooltip.className = 'link-tooltip';
                tooltip.innerText = link;
                tooltip.onclick = ()=>copyLink(link);

                img.onerror = function() {
                    card.innerHTML += `<div class="error-tip">❌ 加载失败<br>${link}</div>`;
                };

                card.appendChild(img);
                card.appendChild(tooltip);
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>

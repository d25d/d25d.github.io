<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>蜿蜒之路 - 小队血条共享</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a2f2a 0%, #064e3b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #1e3a2f;
            border-radius: 48px;
            padding: 20px 24px 24px 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            cursor: crosshair;
            background: #2c4b3e;
        }

        .info-panel {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            background: #0f2c24c9;
            backdrop-filter: blur(8px);
            padding: 12px 28px;
            border-radius: 60px;
            border: 1px solid #ffd96688;
        }

        .gold-box, .upgrade-box {
            background: #2b2118;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            color: #ffecb3;
            text-shadow: 0 2px 2px black;
            box-shadow: inset 0 1px 3px #ffd58c, 0 4px 8px rgba(0,0,0,0.3);
        }

        .gold-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 2px gold);
        }

        .gold-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd966;
            letter-spacing: 1px;
        }

        .exp-bar-container {
            flex: 2;
            min-width: 200px;
            background: #2e241e;
            border-radius: 40px;
            height: 24px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px #00000055;
        }

        .exp-fill {
            width: 0%;
            height: 100%;
            background: radial-gradient(circle, #ffb347, #ff8c00);
            border-radius: 40px;
            transition: width 0.2s ease;
            box-shadow: 0 0 6px #ffcc66;
        }

        .reset-btn {
            background: #7a2e2e;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 6px 22px;
            border-radius: 32px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #3a1a1a;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3a1a1a;
        }

        .upgrade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: inherit;
        }

        .card-panel {
            background: #fff7e8;
            border-radius: 64px;
            padding: 25px 30px 35px;
            width: 750px;
            max-width: 85vw;
            text-align: center;
            box-shadow: 0 25px 40px black;
            border: 3px solid #ffcd94;
        }

        .card-panel h2 {
            margin-top: 0;
            color: #ad5f2a;
            font-size: 2rem;
        }

        .cards {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 25px 0;
        }

        .card {
            background: #f7e5c2;
            border-radius: 36px;
            padding: 20px 18px;
            width: 180px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            border: 2px solid #e7b874;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-8px);
            background: #ffefcf;
            border-color: #ffa559;
        }

        .card-title {
            font-size: 1.7rem;
            font-weight: bold;
            color: #b45f2b;
        }
        .card-desc {
            font-size: 1rem;
            color: #5a3e28;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600" style="width:1000px;height:600px"></canvas>
        <div class="info-panel">
            <div class="gold-box">
                <span class="gold-icon">💰</span>
                <span class="gold-value" id="goldAmount">0</span>
            </div>
            <div class="exp-bar-container">
                <div class="exp-fill" id="expFill"></div>
            </div>
            <button class="reset-btn" id="resetGameBtn">🏹 重铸征途</button>
            
            
            <div class="debug-buttons" style="display: flex; gap: 10px; margin-left: auto;">
                <button class="debug-btn" data-effect="damage">⚡ +6伤害</button>
                <button class="debug-btn" data-effect="cooldown">🏹 -22%冷却</button>
                <button class="debug-btn" data-effect="arrows">✨ +1箭矢</button>
                <button class="debug-btn" data-effect="speed">💨 +15%伤害</button>
            </div>


        </div>
    </div>
</div>

<script>

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ---------- 蜿蜒道路 ----------
    const startPoint = {x: 120, y: 70};
    const endPoint = {x: canvas.width/2, y: canvas.height - 65};
    const segments = [
        // { start: startPoint, cp1: {x: 220, y: 40}, cp2: {x: 340, y: 100}, end: {x: 420, y: 150} },
        // { start: {x: 420, y: 150}, cp1: {x: 520, y: 210}, cp2: {x: 580, y: 140}, end: {x: 670, y: 170} },
        // { start: {x: 670, y: 170}, cp1: {x: 760, y: 200}, cp2: {x: 820, y: 280}, end: {x: 760, y: 350} },
        // { start: {x: 760, y: 350}, cp1: {x: 700, y: 420}, cp2: {x: 610, y: 440}, end: {x: 530, y: 400} },
        // { start: {x: 530, y: 400}, cp1: {x: 450, y: 360}, cp2: {x: 430, y: 460}, end: {x: 490, y: 510} },
        // { start: {x: 490, y: 510}, cp1: {x: 540, y: 550}, cp2: {x: canvas.width/2+20, y: 470}, end: endPoint }

        // 第1段：起点向右下弯曲
        { start: startPoint, cp1: {x: 200, y: 60}, cp2: {x: 300, y: 120}, end: {x: 400, y: 200} },
        // 第2段：向左下弯曲 (第一次缠绕)
        { start: {x: 400, y: 200}, cp1: {x: 300, y: 260}, cp2: {x: 200, y: 240}, end: {x: 180, y: 300} },
        // 第3段：向右下弯曲
        { start: {x: 180, y: 300}, cp1: {x: 250, y: 360}, cp2: {x: 400, y: 340}, end: {x: 500, y: 380} },
        // 第4段：向左下弯曲 (第二次缠绕)
        { start: {x: 500, y: 380}, cp1: {x: 400, y: 420}, cp2: {x: 250, y: 410}, end: {x: 220, y: 460} },
        // 第5段：向右下弯曲
        { start: {x: 220, y: 460}, cp1: {x: 300, y: 500}, cp2: {x: 450, y: 480}, end: {x: 550, y: 510} },
        // 第6段：最终段，通向终点
        { start: {x: 550, y: 510}, cp1: {x: 650, y: 530}, cp2: {x: 600, y: 560}, end: endPoint }
    ];
    
    // 路径追踪器 (预存点、切线)
    class PathTracker {
        constructor(segments, stepSize = 8) {
            this.points = [];
            this.totalLength = 0;
            let lastPt = null;
            for(let seg of segments){
                const steps = 40;
                for(let i=0; i<=steps; i++){
                    const t = i/steps;
                    const p = this.cubicBezier(seg.start, seg.cp1, seg.cp2, seg.end, t);
                    let tangent = {x:0, y:0};
                    if(i===0){
                        const p2 = this.cubicBezier(seg.start, seg.cp1, seg.cp2, seg.end, t+0.02);
                        tangent = {x: p2.x-p.x, y: p2.y-p.y};
                    } else if(i===steps){
                        const p0 = this.cubicBezier(seg.start, seg.cp1, seg.cp2, seg.end, t-0.02);
                        tangent = {x: p.x-p0.x, y: p.y-p0.y};
                    } else {
                        const pPrev = this.cubicBezier(seg.start, seg.cp1, seg.cp2, seg.end, t-0.02);
                        const pNext = this.cubicBezier(seg.start, seg.cp1, seg.cp2, seg.end, t+0.02);
                        tangent = {x: pNext.x-pPrev.x, y: pNext.y-pPrev.y};
                    }
                    const angle = Math.atan2(tangent.y, tangent.x);
                    if(lastPt){
                        const dx = p.x - lastPt.x;
                        const dy = p.y - lastPt.y;
                        const dist = Math.hypot(dx,dy);
                        this.totalLength += dist;
                        this.points.push({x:p.x, y:p.y, dist: this.totalLength, tangentAngle: angle});
                    } else {
                        this.points.push({x:p.x, y:p.y, dist: 0, tangentAngle: angle});
                    }
                    lastPt = p;
                }
            }
            this.points.push({x: endPoint.x, y: endPoint.y, dist: this.totalLength, tangentAngle: this.points[this.points.length-1].tangentAngle});
        }
        
        cubicBezier(p0, p1, p2, p3, t){
            const mt = 1-t;
            const x = mt*mt*mt*p0.x + 3*mt*mt*t*p1.x + 3*mt*t*t*p2.x + t*t*t*p3.x;
            const y = mt*mt*mt*p0.y + 3*mt*mt*t*p1.y + 3*mt*t*t*p2.y + t*t*t*p3.y;
            return {x, y};
        }
        
        getPositionAt(distance){
            if(distance <= 0) return {x: this.points[0].x, y: this.points[0].y};
            if(distance >= this.totalLength) return {x: this.points[this.points.length-1].x, y: this.points[this.points.length-1].y};
            for(let i=1; i<this.points.length; i++){
                if(this.points[i].dist >= distance){
                    const prev = this.points[i-1];
                    const curr = this.points[i];
                    const t = (distance - prev.dist) / (curr.dist - prev.dist);
                    const x = prev.x + (curr.x - prev.x)*t;
                    const y = prev.y + (curr.y - prev.y)*t;
                    return {x, y};
                }
            }
            return this.points[0];
        }
        
        getTangentAngleAt(distance){
            if(distance <= 0) return this.points[0].tangentAngle;
            if(distance >= this.totalLength) return this.points[this.points.length-1].tangentAngle;
            for(let i=1; i<this.points.length; i++){
                if(this.points[i].dist >= distance){
                    const prev = this.points[i-1];
                    const curr = this.points[i];
                    const t = (distance - prev.dist) / (curr.dist - prev.dist);
                    return prev.tangentAngle + (curr.tangentAngle - prev.tangentAngle) * t;
                }
            }
            return 0;
        }
    }
    
    const pathData = new PathTracker(segments);
    const TOTAL_PATH_LEN = pathData.totalLength;
    
    // ---------- 怪物组 (每个组一只怪物) ----------
    class MonsterGroup {
        constructor(distanceFromStart, baseHp, type = 'normal') {
            this.distance = distanceFromStart;
            this.maxHp = baseHp;
            this.hp = baseHp;
            this.type = type;
            this.speed = 10;          // 怪物移动像素/秒
        }
        
        takeDamage(amount) {
            this.hp -= amount;
            return this.hp <= 0;
        }
        
        getPosition(path) {
            return path.getPositionAt(this.distance);
        }
        
        update(deltaTime) {
            this.distance += this.speed * deltaTime;
        }
    }
    
    // ---------- 小队 (共享血条，包含连续5个MonsterGroup) ----------
    class Squad {
        constructor(groups, baseHp) {
            this.groups = groups;       // 数组，引用MonsterGroup对象
            this.maxHp = baseHp;
            this.hp = baseHp;
            this.flashRemaining = 0;      // 闪光剩余秒数
            this.color="";
            this.number = 5;            //几个组为一队
        }
        
        startFlash(duration) {
            this.flashRemaining = duration;
            // console.log("此时需要受击光效");
            // console.log(this.flashRemaining);
        }
        
        updateFlash(deltaTime) {
            if (this.flashRemaining > 0) {
                this.flashRemaining -= deltaTime;
            }
        }
        
        takeDamage(amount) {
            this.hp -= amount;
            if(this.hp <= 0) return true;  // 全灭
            return false;
        }
        
        // 得到小队的中心位置 (根据各怪物位置平均)
        getCenterPosition(path) {
            let sumX = 0, sumY = 0;
            for(let g of this.groups) {
                const pos = g.getPosition(path);
                sumX += pos.x;
                sumY += pos.y;
            }
            const len = this.groups.length;
            return {x: sumX / len, y: sumY / len};
        }
        
        // 是否全部存活 (只要还有group在)
        isAlive() {
            return this.groups.length > 0 && this.hp > 0;
        }
        
        // 检查所有group是否都走到了终点 (用于胜利判定)
        anyReachedEnd() {
            for(let g of this.groups) {
                if(g.distance >= TOTAL_PATH_LEN - 2) return true;
            }
            return false;
        }
    }
    
    // ---------- 箭矢 ----------
    class Arrow {
        constructor(x, y, angle, damage, speed=450) {
            this.x = x;
            this.y = y;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.damage = damage;
            this.active = true;
        }
        update(deltaTime){
            this.x += this.vx * deltaTime;
            this.y += this.vy * deltaTime;
            if(this.x < -50 || this.x > canvas.width+50 || this.y < -50 || this.y > canvas.height+100) this.active = false;
        }
        draw(ctx){
            ctx.save();
            ctx.beginPath();
            ctx.arc(this.x, this.y, 5, 0, Math.PI*2);
            ctx.fillStyle = "#f5bc70";
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(this.x+8, this.y);
            ctx.lineTo(this.x-4, this.y-4);
            ctx.lineTo(this.x-4, this.y+4);
            ctx.fillStyle = "#e09d32";
            ctx.fill();
            ctx.restore();
        }
    }
    
    // ---------- 游戏全局状态 ----------
    let gameRunning = true;
    let gameOverFlag = false;
    let winFlag = false;
    let gold = 0;
    let upgradeExp = 0;
    let upgradeThreshold = 60;
    let currentUpgradeLevel = 0;

    let originPlayerStats = {
        arrowDamage: 12,
        arrowCooldown: 2,// 箭矢冷却
        extraArrows: 0,
        arrowSpeed: 150,  //箭矢速度
    };

    let playerStats = { ...originPlayerStats };
   
    let lastShootTime = 0;
    let mouseAngle = -Math.PI/2;
    
    let squads = [];          // 小队数组
    let monsterGroups = [];   // 所有怪物组（用于快速移动/碰撞）
    let arrows = [];
    
    let damageNumbers = [];  // 伤害数字  每个元素: { x, y, value, life }
    
    let isUpgradePaused = false;

    let spawnTimer = 0;           // 生成怪物计时器
    let spawnInterval = 2.5;     // 每隔秒生成一个怪物组,速度和间距计算得出
    let totalSpawned = 0;          // 已生成的怪物组数量
    let totalToSpawn = 10;         // 总共要生成的怪物组数量

    let portalPositions = [];
        const totalPortals = 4;        // 10个传送门
        const spacing = 40;             // 每隔150像素弧长放一个
        for (let i = 0; i < totalPortals; i++) {
            portalPositions.push(i * spacing);
        }

    function spawnMonsterGroup() {
        if (totalSpawned >= totalToSpawn) return;
        
        const baseHp = 380;
        let hpVal = baseHp + Math.floor(currentUpgradeLevel * 3);
        if (hpVal < 22) hpVal = 28;
        
        // 新怪物组从起点开始（distance = 0）
        const newGroup = new MonsterGroup(0, hpVal, 'normal');
        const hue = Math.random() * 360;
        let squad_number = new Squad().number;
        if(totalSpawned === 0) {newGroup.color = `hsl(${hue}, 70%, 55%)`;}
        else {newGroup.color = totalSpawned % squad_number === 0 ? `hsl(${hue}, 70%, 55%)` : monsterGroups[totalSpawned - 1].color};
        
        monsterGroups.push(newGroup);
        totalSpawned++;
        
        

        // 注意：小队的组建逻辑也需要动态处理
        // 方案A：每5个新生成的怪物自动组成一个小队
        if (totalSpawned >= squad_number && totalSpawned % squad_number === 0) {
            const lastFive = monsterGroups.slice(-squad_number);
            const squadHp = lastFive.reduce((sum, g) => sum + g.maxHp, 0);
            const squad = new Squad(lastFive, squadHp);
             squad.groups.forEach(g => {
                g.squadRef = squad;

            });
            squad.color = lastFive[0].color;
            squads.push(squad);
        }
    }

    
    function getActualShootCooldown(){
        return Math.max(0.22, playerStats.arrowCooldown);
    }
    
    // 初始化怪物队伍: 创建 N 个怪物组，每5组构成一个小队
    function initMonstersAndSquads(){
        // const totalGroups = 80;          // 共只怪物，组成个小队
        // const startDistance = -1500;     // 起点位置
        // const spacing = 25;              // 组间距离(像素弧长)
        // const groups = [];
        // const baseHp = 380;              //血量
        
        // for(let i=0; i<totalGroups; i++){
        //     let hpVal = baseHp + Math.floor(currentUpgradeLevel * 3);
        //     if(hpVal < 22) hpVal = 28;
        //     const group = new MonsterGroup(startDistance + i*spacing, hpVal, 'normal');
            
        //     groups.push(group);
        // }
        
        // // 组建小队 (每5个一组)
        // const newSquads = [];
        // const squadSize = 5;
        // for(let i=0; i<groups.length; i+=squadSize){
        //     const squadGroups = groups.slice(i, i+squadSize);
        //     if(squadGroups.length === 0) continue;
        //     // 小队总血量 = 单个怪物血量 * 队员数 (可调整)
        //     const squadHp = squadGroups.reduce((sum, g) => sum + g.maxHp - sum, 0);
        //     const squad = new Squad(squadGroups, squadHp);
        //     const hue = Math.random() * 360;
        //     squad.groups.forEach(g => {
                
        //         g.color = `hsl(${hue}, 70%, 55%)`;  // 饱和度70%，亮度55%
        //         g.squadRef = squad;

        //     });
        //     newSquads.push(squad);
        // }
        // return { groups, squads: newSquads };

        groups = [];
        newSquads = [];
        totalSpawned = 0;
        spawnTimer = 0;
        return { groups, squads: newSquads };
    }
    
    function resetGame(){
        gold = 0;
        upgradeExp = 0;
        currentUpgradeLevel = 0;
        updateGoldUI();
        updateExpBar();
        playerStats = { ...originPlayerStats };
        const { groups, squads: newSquads } = initMonstersAndSquads();
        monsterGroups = groups;
        squads = newSquads;
        arrows = [];
        gameRunning = true;
        gameOverFlag = false;
        winFlag = false;
        isUpgradePaused = false;
        lastShootTime = performance.now() / 1000;
        removeUpgradeOverlay();

        spawnTimer = 0;
        totalSpawned = 0;
        monsterGroups = [];
        squads = [];
        // 可选：立即生成第一只怪物
        spawnMonsterGroup();
    }
    
    function addGold(amount){
        gold += amount;
        updateGoldUI();
        upgradeExp += amount;
        while(upgradeExp >= upgradeThreshold && !isUpgradePaused && !gameOverFlag && gameRunning){
            upgradeExp -= upgradeThreshold;
            triggerUpgradeChoice();
            if(isUpgradePaused) break;
        }
        updateExpBar();
    }
    
    function updateGoldUI(){
        document.getElementById('goldAmount').innerText = Math.floor(gold);
    }
    function updateExpBar(){
        let percent = (upgradeExp / upgradeThreshold) * 100;
        if(percent>100) percent=100;
        document.getElementById('expFill').style.width = percent + "%";
    }
    
    // 升级卡片库
    function generateUpgradeCards(){
        const lib = [
            { title:"🏹 疾风箭矢", desc:"发射频率 +22%", effect:()=>{ playerStats.arrowCooldown *= 0.78; } },
            { title:"⚔️ 锋锐箭头", desc:"伤害 +6点", effect:()=>{ playerStats.arrowDamage += 6; } },
            { title:"✨ 双重射击", desc:"弓箭数量 +1", effect:()=>{ playerStats.extraArrows += 1; } },
            { title:"🌀 鹰眼专注", desc:"伤害 +15%", effect:()=>{ playerStats.arrowDamage = Math.floor(playerStats.arrowDamage * 1.15); } },
            { title:"⏩ 神速连射", desc:"冷却缩减 28%", effect:()=>{ playerStats.arrowCooldown *= 0.72; } },
            { title:"💢 分裂箭术", desc:"额外箭矢 +1", effect:()=>{ playerStats.extraArrows += 1; } },
        ];
        let shuffled = [...lib];
        for(let i=shuffled.length - 1; i > 0; i--){
            const j = Math.floor(Math.random()*(i+1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0,3);
    }
    
    function triggerUpgradeChoice(){
        if(!gameRunning || gameOverFlag) return;
        gameRunning = false;
        isUpgradePaused = true;
        const cards = generateUpgradeCards();
        showUpgradeCardsUI(cards);
    }
    
    function showUpgradeCardsUI(cards){
        removeUpgradeOverlay();
        const overlay = document.createElement('div');
        overlay.className = 'upgrade-overlay';
        overlay.id = 'upgradeOverlay';
        const panel = document.createElement('div');
        panel.className = 'card-panel';
        panel.innerHTML = `<h2>✨ 蜕变升级 ✨</h2><div class="cards" id="cardsContainer"></div><p style="margin-top:20px;color:#886633;">选择一种力量，继续征途！</p>`;
        overlay.appendChild(panel);
        document.body.appendChild(overlay);
        const container = document.getElementById('cardsContainer');
        cards.forEach((card, idx)=>{
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.innerHTML = `<div class="card-title">${card.title}</div><div class="card-desc">${card.desc}</div>`;
            cardDiv.addEventListener('click', ()=>{
                card.effect();
                upgradeThreshold = Math.floor(upgradeThreshold * 1.18);
                if(upgradeThreshold < 50) upgradeThreshold = 60;
                currentUpgradeLevel++;
                removeUpgradeOverlay();
                gameRunning = true;
                isUpgradePaused = false;
                updateExpBar();
                while(upgradeExp >= upgradeThreshold && gameRunning && !gameOverFlag){
                    upgradeExp -= upgradeThreshold;
                    triggerUpgradeChoice();
                    if(isUpgradePaused) break;
                }
                updateExpBar();
            });
            container.appendChild(cardDiv);
        });
    }
    
    function removeUpgradeOverlay(){
        const exist = document.getElementById('upgradeOverlay');
        if(exist) exist.remove();
    }
    
    // 碰撞处理：击中怪物 -> 找到所属小队 -> 扣小队血量 -> 若小队死亡则移除其所有怪物组
    function handleArrowCollisions(deltaTime){
        for(let i=0;i<arrows.length;i++){
            const arrow = arrows[i];
            if(!arrow.active) continue;
            let hit = false;
            for(let j=0;j<monsterGroups.length;j++){
                const group = monsterGroups[j];
                const pos = group.getPosition(pathData);
                const dx = arrow.x - pos.x;
                const dy = arrow.y - pos.y;
                if(Math.hypot(dx,dy) < 22){  // 命中半径
                    // 找到所属小队
                    const squad = squads.find(s => s.groups.includes(group));
                    if(squad && squad.isAlive()){
                        
                        addDamageNumber(arrow.x, arrow.y, arrow.damage);
                        
                        squad.startFlash(0.15);      // 闪光 0.15 秒
                        const isSquadDead = squad.takeDamage(arrow.damage);
                        arrow.active = true;
                        hit = true;
                        if(isSquadDead){
                            // 小队全灭：移除所有属于该小队的怪物组，并给予金币
                            const reward = 30;//squad.groups.reduce((sum, g) => sum + 18 + Math.floor(g.maxHp/8), 0);
                            addGold(reward);
                            // 从 monsterGroups 中过滤掉这些组
                            const deadGroupIds = new Set(squad.groups);
                            monsterGroups = monsterGroups.filter(g => !deadGroupIds.has(g));
                            // 从 squads 中移除该小队
                            squads = squads.filter(s => s !== squad);
                            // 如果已经没有怪物，胜利
                            if(monsterGroups.length === 0 && !gameOverFlag && gameRunning){
                                gameRunning = false;
                                gameOverFlag = true;
                                winFlag = true;
                                removeUpgradeOverlay();
                                
                            }
                        }
                        break; // 一箭只击中一个怪物
                    }
                }
            }
            if(hit){
                arrow.active = false;
                continue;
            }
            if(arrow.x<-100||arrow.x>canvas.width+100||arrow.y<-100||arrow.y>canvas.height+150) arrow.active=false;
        }
        arrows = arrows.filter(a=>a.active);
    }
    
    function shootArrow(currentTime){
        if(!gameRunning || gameOverFlag || isUpgradePaused) return false;
        const bowPos = {x: endPoint.x, y: endPoint.y};
        const angle = mouseAngle;
        const damage = playerStats.arrowDamage;
        const mainArrow = new Arrow(bowPos.x, bowPos.y, angle, damage, playerStats.arrowSpeed);
        arrows.push(mainArrow);
        const extraCount = playerStats.extraArrows;
        for(let i = 1; i <= extraCount; i++){
            // 角度完全和主箭一致，不偏移角度 → 保证平行
            let sameAngle = angle;
        
            // 左右偏移距离，错开位置
            let offsetDir = i % 2 === 0 ? 1 : -1;
            let offsetDis = Math.ceil(i / 2) * 10; // 8 是偏移间距，可自行调大小
        
            // 垂直于箭矢方向 做左右平移
            let dx = Math.cos(sameAngle + Math.PI/2) * offsetDir * offsetDis;
            let dy = Math.sin(sameAngle + Math.PI/2) * offsetDir * offsetDis;
        
            const extraArrow = new Arrow(
                bowPos.x + dx,
                bowPos.y + dy,
                sameAngle,   // 角度完全一样 → 平行
                damage,
                playerStats.arrowSpeed
            );
            arrows.push(extraArrow);
        }
        return true;
    }
    
    // 添加伤害数字
    function addDamageNumber(x, y, damage) {
        const offsetX = (Math.random() - 0.5) * 24;
        const offsetY = (Math.random() - 0.5) * 20-10;
        damageNumbers.push({
            x: x + offsetX,
            y: y + offsetY,
            value: Math.floor(damage),
            life: 0.8,   // 存在0.5秒
            vy: -50           // 向上漂浮速度 (像素/秒)
        });
    }
    
    function updateDamageNumbers(deltaTime) {
        for (let i = 0; i < damageNumbers.length; i++) {
            const num = damageNumbers[i];
            num.life -= deltaTime;
            num.y += num.vy * deltaTime;
            if (num.life <= 0) {
                damageNumbers.splice(i, 1);
                i--;
            }
        }
    }
    
    function drawDamageNumbers() {
        for (let num of damageNumbers) {
            const alpha = Math.min(1, num.life * 1.5);
            ctx.save();
            ctx.font = "bold 20px 'Segoe UI'";
            ctx.shadowBlur = 0;
            ctx.fillStyle = `rgba(80, 180, 255, ${alpha})`;
            ctx.fillText(`-${num.value}`, num.x - 15, num.y);
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.8})`;
            ctx.fillText(`-${num.value}`, num.x - 16, num.y - 1);
            ctx.restore();
        }
    }
    
    function updateMonsters(deltaTime){
        if(!gameRunning || gameOverFlag) return false;

        spawnTimer += deltaTime;//慢慢从起点刷新怪物
        if (spawnTimer >= spawnInterval && totalSpawned < totalToSpawn) {
            spawnTimer = 0;
            spawnMonsterGroup();
        }

        // 更新每个怪物距离
        for(let group of monsterGroups){
            group.update(deltaTime);
        }
        
        //更新伤害数字生存时间
        updateDamageNumbers(deltaTime);
        
        // 更新所有小队的闪光计时器
        for(let squad of squads) {
            squad.updateFlash(deltaTime);
        }
        // 检查是否有任何怪物到达终点（任意小队到达即失败）
        for(let squad of squads){
            if(squad.anyReachedEnd()){
                gameRunning = false;
                gameOverFlag = true;
                winFlag = false;
                removeUpgradeOverlay();
                return true;
            }
        }
        return false;
    }
    
    let lastTimeFrame = 0;
    function updateShooting(nowSec){
        if(!gameRunning || gameOverFlag || isUpgradePaused) return;
        if(nowSec - lastShootTime >= getActualShootCooldown()){
            shootArrow(nowSec);
            lastShootTime = nowSec;
        }
    }
    
    // 渲染怪物群：每个怪物独立绘制（现在已经是一个组一个怪物），但小队血条共享
    function renderMonsters(){
        // 先绘制所有怪物个体
        for(let group of monsterGroups){
            const pos = group.getPosition(pathData);
            const x = pos.x;
            const y = pos.y - 4;  // 微调
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI*2);
            //ctx.fillStyle = group.type === 'boss' ? "#bd5e2c" : "#5f4330";
            // 默认颜色
            let fillColor = group.type === 'boss' ? "#bd5e2c" : group.color;
            // 如果小队处于闪光状态，覆盖为亮色
            if (group.squadRef && group.squadRef.flashRemaining > 0) {
            fillColor = "#ffffff";   // 纯白 或 "#fff5cc" 暖白
            }
            ctx.fillStyle = fillColor;
            ctx.fill();
            // 眼睛
            ctx.fillStyle = "#ffc285";
            ctx.beginPath();
            ctx.ellipse(x-4, y-5, 3, 4, 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(x-5, y-7, 1.5, 0, 2*Math.PI);
            ctx.fill();
        }
        // 绘制每个小队的血条 (根据小队中心点和切线方向)
        for(let squad of squads){
            if(!squad.isAlive()) continue;
            const center = squad.getCenterPosition(pathData);
            // 需要获取小队中心点的切线角度，用以偏移血条法线方向
            // 为了简单，取小队中第一个怪物的距离代表的切线角度
            const firstGroup = squad.groups[0];
            if(!firstGroup) continue;
            const tangentAngle = pathData.getTangentAngleAt(firstGroup.distance);
            const normalAngle = tangentAngle + Math.PI/2;
            const barX = center.x + Math.cos(normalAngle) * (-24);
            const barY = center.y + Math.sin(normalAngle) * (-24);
            const remaining = Math.max(0, squad.hp / squad.maxHp);
            // ctx.fillStyle = "#512e1a";
            // ctx.fillRect(barX-30, barY-6, 60, 12);
            // ctx.fillStyle = "#e34d2b";
            // ctx.fillRect(barX-30, barY-6, 60 * remaining, 11);
            ctx.fillStyle = "white";
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.shadowBlur = 0;
            ctx.fillText(`${Math.max(0, Math.floor(squad.hp))}`, barX-15, barY-10);
        }
    }
    
    function render(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        // 绘制道路
        ctx.save();
        // 绘制单一线条
        ctx.beginPath();
        ctx.moveTo(pathData.points[0].x, pathData.points[0].y);
        for(let i=1; i<pathData.points.length; i++){
            ctx.lineTo(pathData.points[i].x, pathData.points[i].y);
        }
        ctx.lineWidth = 3;  // 线条粗细
        ctx.strokeStyle = "#d6a15a";
        ctx.setLineDash([12, 16]);   // 设置虚线模式
        ctx.stroke();
        ctx.setLineDash([]);         // 恢复实线，避免影响后续绘图
        
        renderMonsters();//怪物
        
        
        // 绘制传送门（在怪物下方，作为装饰/出生点标记）
        ctx.save();
        for (let dist of portalPositions) {
            if (dist > pathData.totalLength) continue;
            const pos = pathData.getPositionAt(dist);
            // 绘制简单传送门（旋转光圈）
            // ctx.beginPath();
            // ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2);
            // ctx.fillStyle = "rgba(100, 50, 150, 0.5)";
            // ctx.fill();
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, spacing/2, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(200, 100, 255, 1)";
            ctx.fill();
        }
        ctx.restore();



        for(let a of arrows) a.draw(ctx);
        
        // 弓箭手
        ctx.beginPath();
        ctx.arc(endPoint.x, endPoint.y, 20, 0, Math.PI*2);
        ctx.fillStyle = "#2c5e3f";
        ctx.fill();
        ctx.fillStyle = "#e2b13b";
        ctx.beginPath();
        ctx.ellipse(endPoint.x-5, endPoint.y-3, 4, 6, 0, 0, Math.PI*2);
        ctx.fill();
        const aimX = endPoint.x + Math.cos(mouseAngle)*50;
        const aimY = endPoint.y + Math.sin(mouseAngle)*50;
        ctx.beginPath();
        ctx.moveTo(endPoint.x, endPoint.y);
        ctx.lineTo(aimX, aimY);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#ffdd88";
        ctx.setLineDash([6,8]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "gold";
        ctx.font = "bold 20px 'Segoe UI'";
        ctx.fillText("🏹", endPoint.x-14, endPoint.y-10);
        
        if(gameOverFlag){
            ctx.font = "bold 36px system-ui";
            ctx.fillStyle = winFlag? "#FFD966" : "#DC4C4C";
            ctx.fillText(winFlag? "✨ 胜利！✨" : "💀 失败！怪物抵达终点 💀", canvas.width/2-220, 70);
        }
        if(isUpgradePaused && !gameOverFlag){
            ctx.font = "bold 20px monospace";
            ctx.fillStyle = "#fff9c9";
            ctx.shadowColor="black";
            ctx.fillText("⚡ 升级选择中 ⚡", canvas.width/2-110, 50);
        }
        ctx.restore();
        
        drawDamageNumbers();
    }
    
    // 主循环
    let lastTimestamp = 0;
    function gameLoop(nowMs){
        requestAnimationFrame(gameLoop);
        const nowSec = nowMs / 1000;
        let delta = Math.min(0.033, (nowSec - (lastTimestamp||nowSec)));
        if(delta <=0) {lastTimestamp = nowSec; render(); return;}
        lastTimestamp = nowSec;
        if(!gameOverFlag && gameRunning && !isUpgradePaused){
            updateMonsters(delta);
            if(monsterGroups.length===0 && !gameOverFlag){
                gameRunning=false;
                gameOverFlag=true;
                winFlag=true;
            }
            updateShooting(nowSec);
            for(let a of arrows) a.update(delta);
            handleArrowCollisions(delta);
        }
        render();
    }
    
    // 单击控制方向
    function initClickControl(){
        canvas.addEventListener('click', (e)=>{
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width/rect.width;
            const scaleY = canvas.height/rect.height;
            let canvasX = (e.clientX - rect.left) * scaleX;
            let canvasY = (e.clientY - rect.top) * scaleY;
            const dx = canvasX - endPoint.x;
            const dy = canvasY - endPoint.y;
            mouseAngle = Math.atan2(dy, dx);
        });
        canvas.addEventListener('touchstart', (e)=>{
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            let canvasX = (touch.clientX - rect.left) * (canvas.width/rect.width);
            let canvasY = (touch.clientY - rect.top) * (canvas.height/rect.height);
            const dx = canvasX - endPoint.x;
            const dy = canvasY - endPoint.y;
            mouseAngle = Math.atan2(dy, dx);
        });
    }
    
    document.getElementById('resetGameBtn').addEventListener('click',()=>{
        if(isUpgradePaused) removeUpgradeOverlay();
        resetGame();
        gameRunning = true;
        gameOverFlag=false;
        winFlag=false;
        isUpgradePaused=false;
        lastShootTime = performance.now()/1000;
    });
    
    resetGame();
    initClickControl();
    requestAnimationFrame(gameLoop);
    
    
// 直接应用升级效果 (不触发暂停界面)
function applyUpgradeEffect(effectType) {
    switch(effectType) {
        case 'damage':
            playerStats.arrowDamage += 6;
            break;
        case 'cooldown':
            playerStats.arrowCooldown *= 0.78;
            break;
        case 'arrows':
            playerStats.extraArrows += 1;
            break;
        case 'speed':
            playerStats.arrowDamage = Math.floor(playerStats.arrowDamage * 1.15);
            break;
        default: return;
    }
        // 可选：在控制台输出当前状态
        console.log("升级应用:", effectType, playerStats);
    }
    
    // 绑定按钮事件
    document.querySelectorAll('.debug-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const effect = btn.dataset.effect;
            applyUpgradeEffect(effect);
        });
    });







</script>

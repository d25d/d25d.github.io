<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="baidu_union_verify" content="5ef2c241a82898fa2a2fae4f765341f6">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日资讯 · 质感导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    body {
      background: linear-gradient(-45deg, #1a2a6c, #2a0845, #141e30, #243b55);
      background-size: 400% 400%;
      animation: gradientBg 15s ease infinite;
      color: #fff;
      padding-bottom: 120px;
    }

    @keyframes gradientBg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 毛玻璃通用样式 */
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    /* 头部 */
    header {
      padding: 36px 20px;
      text-align: center;
      border-radius: 0 0 24px 24px;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 30px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    header p {
      opacity: 0.85;
      font-size: 15px;
    }

    /* 进入按钮 */
    .nav-box {
      text-align: center;
      margin: 0 auto 40px;
    }

    .btn {
      display: inline-block;
      padding: 16px 42px;
      border-radius: 99px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 17px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(255, 255, 255, 0.15);
    }

    /* 资讯卡片 */
    .card {
      max-width: 720px;
      margin: 0 auto 30px;
      padding: 32px 28px;
      border-radius: 22px;
      text-align: left;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #quote {
      font-size: 17px;
      line-height: 1.9;
      opacity: 0.95;
      margin-bottom: 14px;
    }

    #author {
      text-align: right;
      opacity: 0.7;
      font-size: 15px;
    }

    /* 广告位 */
    .ad-area {
      max-width: 728px;
      margin: 50px auto;
      text-align: center;
      padding: 20px;
      border-radius: 18px;
    }

    /* 底部 */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      text-align: center;
      border-radius: 20px 20px 0 0;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <header class="glass">
    <h1>✨ 每日灵感 · 精致导航</h1>
    <p>每天打开都有新内容 · 高级质感 · 实用便捷</p>
  </header>

  <div class="nav-box">
    <a href="htmls/navigation.html" class="btn glass">
      🧭 进入导航中心
    </a>
  </div>

  <div class="card glass">
    <h2>📅 今日精选句子</h2>
    <div id="quote">正在获取今日内容...</div>
    <div id="author"></div>
  </div>

  <div class="ad-area glass">
    <!-- 广告自动加载区域 -->
  </div>

  <footer class="glass">
    © 2025 每日精致导航 · 每天都值得来看一眼
  </footer>

  <script src="./ads.js"></script>

  <script>
    // 动态获取一句话（真实接口）
    fetch('https://rickandmortyapi.com/api/character')
      .then(r => r.json())
      .then(data => {
        document.getElementById('quote').textContent = data.data?.quote || '保持热爱，奔赴山海';
        document.getElementById('author').textContent = data.data?.author ? `—— ${data.data.author}` : '—— 佚名';
      })
      .catch(() => {
        document.getElementById('quote').textContent = '生活原本沉闷，但跑起来就有风';
      });
  </script>
  
  <div id="list"></div>

<script>
fetch("https://rickandmortyapi.com/api/character")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.slice(0,10).forEach(item => {
      html += `<h3>${item.title}</h3><p>${item.body}</p><hr>`;
    });
    document.getElementById("list").innerHTML = html;
  })
</script>

</body>
</html>
